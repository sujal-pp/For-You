<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Someone Special ❤️</title>
    <style>
        :root {
            --primary-pink: #ff758c;
            --accent-green: #00ff88;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url("her.png");
            background-size: cover;
            background-position: center;
        }

        /* Floating Elements */
        .heart {
            position: absolute;
            pointer-events: none;
            z-index: 1;
            animation: floatUp 6s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* Card Setup */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            color: white;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px 25px;
            border-radius: 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .typing {
            margin: 15px 0;
            font-size: 1.2rem;
            min-height: 50px;
            font-weight: 300;
        }

        /* HIDDEN BY DEFAULT */
        #final-reveal {
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        #final-reveal.show {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 25px;
            min-height: 80px;
        }

        button {
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .yes { background: var(--accent-green); color: #004d2c; }
        .no { background: #ff4d4d; color: white; }

        /* The Celebration Screen */
        .celebration {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: linear-gradient(135deg, #ff758c, #ff4d4d);
            color: white;
            text-align: center;
        }

        .social-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: white;
            color: #ff4d4d;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Hey 💐❤️</h1>
    
    <div class="typing" id="text"></div>

    <div id="final-reveal">
        <h2 style="margin-top: 10px;">Will you be mine, Madam Ji 😘? 🤭</h2>
        <div class="buttons">
            <button class="yes" id="yesBtn" onclick="yesClick()">Yes 😍</button>
            <button class="no" id="noBtn" onmouseover="noToYes()" onclick="noToYes()">No 😅</button>
        </div>
    </div>
</div>

<script>
    // 1. Background Hearts
    function spawnHearts() {
        const h = document.createElement("div");
        h.className = "heart";
        h.innerHTML = "❤️";
        h.style.left = Math.random() * 100 + "vw";
        h.style.fontSize = (15 + Math.random() * 20) + "px";
        h.style.animationDuration = (4 + Math.random() * 3) + "s";
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 6000);
    }
    setInterval(spawnHearts, 400);

    // 2. Typing Effect Logic
    const lines = [
        "I've been thinking about us...",
        "You make everything better 😊",
        "And I really have to ask..."
    ];
    
    let lineIdx = 0;
    let charIdx = 0;
    let target = document.getElementById("text");

    function type() {
        if (lineIdx < lines.length) {
            if (charIdx < lines[lineIdx].length) {
                target.innerHTML += lines[lineIdx].charAt(charIdx);
                charIdx++;
                setTimeout(type, 70);
            } else {
                // Wait a bit, then clear for next line
                setTimeout(() => {
                    if (lineIdx < lines.length - 1) {
                        target.innerHTML = "";
                        charIdx = 0;
                        lineIdx++;
                        type();
                    } else {
                        // ALL TYPING FINISHED
                        showQuestion();
                    }
                }, 1500);
            }
        }
    }

    function showQuestion() {
        document.getElementById("final-reveal").classList.add("show");
    }

    type(); // Start the typing

    // 3. Button Logic
    function noToYes() {
        const noBtn = document.getElementById("noBtn");
        noBtn.innerHTML = "Yes! 😍";
        noBtn.style.background = "#00ff88";
        noBtn.style.color = "#004d2c";
        noBtn.onclick = yesClick;
        document.getElementById("yesBtn").style.transform = "scale(1.3)";
    }

    function yesClick() {
        document.querySelector(".container").style.display = "none";
        const final = document.createElement("div");
        final.className = "celebration";
        final.innerHTML = `
            <h1 style="font-size: 3rem;"> I knew you couldn't say no! 😉💖</h1>
            <p>Click Down to Msg me👇</p>
            <a href="https://www.instagram.com/sujalbhurtel_069/#" target="_blank" class="social-btn">Message Me Now 💌</a>
        `;
        document.body.appendChild(final);
        for(let i=0; i<100; i++) setTimeout(spawnHearts, i*20);
    }
</script>

</body>
</html>
