<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> For Someone Special ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;

    /* HER PHOTO BACKGROUND */
    background:
        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
     

    background-size:cover;
    background-position:center;
}

/* Falling hearts from TOP */
.heart{
    position:absolute;
    top:-10vh;
    color:white;
    animation:fall linear infinite;
}

@keyframes fall{
    to{
        transform:translateY(110vh);
        opacity:0;
    }
}

/* Card */
.container{
    position:relative;
    z-index:2;
    text-align:center;
    color:white;
    background:rgba(0,0,0,0.35);
    padding:30px;
    border-radius:20px;
    width:90%;
    max-width:400px;
    backdrop-filter:blur(10px);
}

/* Typing */
.typing{
    margin:15px 0;
    min-height:50px;
}

/* Buttons */
.buttons{
    position:relative;
    height:100px;
}

button{
    padding:12px 20px;
    margin:10px;
    border:none;
    border-radius:25px;
    cursor:pointer;
    position:relative;
}

.yes{background:#00ff88;}
.no{
    background:#ff4d4d;
    position:absolute;
    left:120px;
    top:40px;
}

button:hover{transform:scale(1.1);}

/* Celebration */
.celebration{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    color:white;
}

/* POP + HURRAY */
.hurray{
    font-size:40px;
    animation:pop .5s ease, glow 1s infinite alternate;
}

@keyframes pop{
    0%{transform:scale(0);}
    80%{transform:scale(1.3);}
    100%{transform:scale(1);}
}

@keyframes glow{
    from{text-shadow:0 0 10px white;}
    to{text-shadow:0 0 30px yellow,0 0 50px pink;}
}

/* Responsive */
@media(max-width:500px){
    .buttons{height:auto;}
    .no{position:relative;left:0;top:0;}
    button{width:100%;}
}
.fade-out{
    animation: fadeOut 0.5s forwards;
}

@keyframes fadeOut{
    to{opacity:0; transform:scale(0.9);}
}
</style>
</head>

<body>

<div class="container">
    <h1>Hey 💐❤️</h1>
    <div class="typing" id="text"></div>
    <h2>Will you be mine? 🤭💖</h2>

    <div class="buttons">
        <button class="yes" onclick="yesClick()">Yes 😍</button>
        <button class="no" onmouseover="moveNo()">No 😅</button>
    </div>
</div>

<script>
/* Falling hearts */
for(let i=0;i<35;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(15+Math.random()*20)+"px";
    h.style.animationDuration=(3+Math.random()*4)+"s";
    document.body.appendChild(h);
}

/* Typing effect */
let msg=[
"I’ve been wanting to tell you something...",
"You make my days better 😊",
"And I really like YOU ❤️"
];

let i=0,j=0,cur="",del=false;

function type(){
    let el=document.getElementById("text");

    if(i<msg.length){
        if(!del && j<=msg[i].length){
            cur=msg[i].substring(0,j++);
        } else if(del && j>=0){
            cur=msg[i].substring(0,j--);
        }

        el.innerHTML=cur;

        if(j==msg[i].length){
            del=true;
            setTimeout(type,1000);
            return;
        }

        if(j==0){
            del=false;
            i++;
        }
    }

    setTimeout(type,del?50:100);
}
type();

/* Move NO button in small area */
function moveNo(){
    let btn=document.querySelector(".no");
    let parent=document.querySelector(".buttons");

    let maxX=parent.offsetWidth-100;
    let maxY=parent.offsetHeight-40;

    let x=Math.random()*maxX;
    let y=Math.random()*maxY;

    btn.style.left=x+"px";
    btn.style.top=y+"px";
}


function yesClick(){
    let box=document.querySelector(".container");
    box.classList.add("fade-out");

    setTimeout(()=>{
        box.style.display="none";

        let div=document.createElement("div");
        div.className="celebration";

        div.innerHTML=`
            <h1 class="hurray">Are You Sure, Finally!!! 🎉😍</h1>
            <p>You made me sooo happy 💖</p>
            <p>Click down to message me👇</p>
            <button onclick="openTikTok()">Message Me 💌</button>
        `;

        document.body.appendChild(div);
    },500);
}


/* TikTok */
function openTikTok(){
    let username="sujal_069";
    window.location.href="tiktok://user?username="+username;

    setTimeout(()=>{
        window.open("https://www.tiktok.com/@"+username,"_blank");
    },1500);
}
</script>

</body>
</html>
