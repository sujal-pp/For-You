<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Someone Special ❤️</title> 

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    overflow:hidden;
}

/* Falling hearts */
.heart{
    position:absolute;
    color:white;
    animation:fall linear infinite;
}
@keyframes fall{
    from{transform:translateY(-10vh);}
    to{transform:translateY(110vh);}
}

/* Main box */
.container{
    text-align:center;
    color:white;
    background:rgba(0,0,0,0.35);
    padding:30px;
    border-radius:20px;
    width:90%;
    max-width:400px;
    backdrop-filter:blur(10px);
}

.typing{margin:15px 0;min-height:50px;}

button{
    padding:12px 20px;
    margin:10px;
    border:none;
    border-radius:25px;
    cursor:pointer;
    transition:0.3s;
}

.yes{background:#00ff88;}
.no{background:#ff4d4d;position:absolute;}

button:hover{transform:scale(1.1);}

/* Celebration */
.celebration{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    color:white;
}

/* HURRAY */
.hurray{
    font-size:42px;
    animation:pop 0.6s ease, glow 1s infinite alternate;
}
@keyframes pop{
    0%{transform:scale(0);}
    80%{transform:scale(1.3);}
    100%{transform:scale(1);}
}
@keyframes glow{
    from{text-shadow:0 0 10px white;}
    to{text-shadow:0 0 25px yellow,0 0 40px pink;}
}

/* Confetti */
.confetti{
    position:absolute;
    width:8px;
    height:8px;
    top:0;
    animation:fall linear infinite;
}

/* Heart explosion */
.explode{
    position:absolute;
    font-size:20px;
    animation:explode 1s ease forwards;
}
@keyframes explode{
    to{
        transform:translate(var(--x),var(--y));
        opacity:0;
    }
}

/* Responsive */
@media(max-width:500px){
    button{width:100%;}
    .no{position:relative;}
}
</style>
</head>

<body>

<div class="container">
    <h1>Hey dear 💐❤️,</h1>
    <div class="typing" id="text"></div>
    <h2>Will you be mine? 🤭💖</h2>

    <button class="yes" onclick="yesClick()">Yes 😍</button>
    <button class="no" onmouseover="moveButton()">No 😅</button>
</div>

<script>
/* Falling hearts */
for(let i=0;i<30;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    h.style.animationDuration=(3+Math.random()*4)+"s";
    h.style.fontSize=(15+Math.random()*20)+"px";
    document.body.appendChild(h);
}

/* Typing */
let msg=[
"I’ve been wanting to tell you something...",
"You make my days better 😊",
"And I really like you ❤️",
    🤍💐
];
let i=0,j=0,current="",del=false;

function type(){
    let el=document.getElementById("text");
    if(i<msg.length){
        if(!del && j<=msg[i].length){
            current=msg[i].substring(0,j++);
        } else if(del && j>=0){
            current=msg[i].substring(0,j--);
        }
        el.innerHTML=current;

        if(j==msg[i].length){del=true;setTimeout(type,1000);return;}
        if(j==0){del=false;i++;}
    }
    setTimeout(type,del?50:100);
}
type();

/* No button */
function moveButton(){
    let b=document.querySelector('.no');
    b.style.left=Math.random()*(window.innerWidth-100)+"px";
    b.style.top=Math.random()*(window.innerHeight-50)+"px";
}

/* YES CLICK */
function yesClick(){

    // Sound
    let audio=new Audio("https://www.soundjay.com/human/cheering-01.mp3");
    audio.play();

    let div=document.createElement("div");
    div.className="celebration";

    div.innerHTML=`
        <h1 class="hurray">Are you Sure, Finally!! 😍</h1>
        <p>You made me sooo happy 💖</p>
        <button onclick="openTikTok()">Message Me 💌</button>
    `;
    document.body.appendChild(div);

    confetti();
    heartExplosion();
}

/* Confetti */
function confetti(){
    for(let i=0;i<80;i++){
        let c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"vw";
        c.style.background=`hsl(${Math.random()*360},100%,50%)`;
        c.style.animationDuration=(2+Math.random()*3)+"s";
        document.body.appendChild(c);
    }
}

/* Heart explosion */
function heartExplosion(){
    for(let i=0;i<30;i++){
        let h=document.createElement("div");
        h.className="explode";
        h.innerHTML="❤️";
        h.style.left="50%";
        h.style.top="50%";
        h.style.setProperty("--x",(Math.random()*300-150)+"px");
        h.style.setProperty("--y",(Math.random()*300-150)+"px");
        document.body.appendChild(h);
    }
}

/* TikTok */
function openTikTok(){
    let username="sujal_069";
    window.location.href="tiktok://user?username="+username;
    setTimeout(()=>{
        window.open("https://www.tiktok.com/@"+username,"_blank");
    },1500);
}
</script>

</body>
</html>
